name: Bug report
description: Report a reproducible non-security defect
title: "[Bug]: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Do not include API keys, production data, regulated data, or security vulnerabilities. Report security issues through a private security advisory.
  - type: input
    id: version
    attributes:
      label: Version or commit
      placeholder: v0.1.0 or commit SHA
    validations:
      required: true
  - type: dropdown
    id: environment
    attributes:
      label: 1Factory environment
      options:
        - Sandbox
        - Validated sandbox
        - Production
        - Validated production
        - No API request involved
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Description
      description: Explain what happened using synthetic or redacted examples only.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction steps
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: checkboxes
    id: safety
    attributes:
      label: Safety check
      options:
        - label: I removed credentials, customer data, regulated data, and other sensitive information.
          required: true
        - label: This report is not a security vulnerability.
          required: true
